<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tables</title>
</head>

<body>

    <center>
        <h1>Student Table</h1>
        <hr>
        <table border="1">

            <thead>
                <tr>
                    <th colspan="3">Student Information</th>
                </tr>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Department</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td rowspan="2">Kirubashankar</td>
                    <td>20</td>
                    <td>CSE</td>
                </tr>
                <tr>
                    <td colspan="2">Full Stack Developer</td>
                </tr>
                <tr>
                    <td rowspan="2">chandrakanth</td>
                    <td>24</td>
                    <td>CSE</td>
                </tr>
                <tr>
                    <td colspan="2">Full Stack Developer</td>
                </tr>
            </tbody>

        </table>
    </center>
    <!-- <p><strong>&lt;thead&gt;</strong> is used to group table header content.</p>
    <p><strong>&lt;tbody&gt;</strong> is used to group table body content.</p>
    <p><strong>colspan</strong> merges multiple columns into one.</p>
    <p><strong>rowspan</strong> merges multiple rows into one.</p> -->

</body>

</html>
