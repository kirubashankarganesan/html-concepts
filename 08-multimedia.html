<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Multimedia</title>
  </head>

  <body>
    <center>
      <h1>Multimedia Example</h1>
      <hr />
    </center>

    <audio controls>
      <source src="./Thalapathy Kacheri.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>

    <hr />
    <!-- audio tag is used to play mp3 file -->
    <h1>Video Example</h1>

    <video width="400" controls>
      <source src="./244839_medium.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
    <!-- video tag is used to play mp4 file -->

    <svg width="100" height="100" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" fill="blue" />
    </svg>
  </body>
</html>
