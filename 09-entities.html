<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HTML Entities</title>
</head>

<body>

    <center>
        <h1>HTML Entities</h1>
        <hr>
    </center>
    <p>Less than: &lt;</p>
    <p>Greater than: &gt;</p>
    <p>Ampersand: &amp;</p>
    <p>Copyright: &copy; 2026</p>
    <p>Registered: &reg;</p>
    <p>Non-breaking space example: Hello&nbsp;&nbsp;&nbsp;World</p>

</body>

</html>
