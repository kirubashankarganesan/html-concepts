<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Text Formatting</title>
</head>

<body>

    <center>
        <h1>Text Formatting Examples</h1>
    </center>
    <hr>
    <p><strong>hello world</strong></p>
    <p><b>hello world</b></p>
    <!-- Strong Text (Semantic Importance)
   Bold Text (Visual Only)-->

    <p><em>hello world</em></p>
    <p><i>hello world</i></p>
    <!-- Emphasized Text (Semantic Importance)
    Italic Text (Visual Only)-->

    <p><u>hello world</u></p>
    <p><mark>hello world</mark></p>
    <p><small>hello world</small></p>
    <!-- u is Underlined Text  
     mark Highlighted Text
     small Small Text-->

    <p>H<sub>2</sub>O (Subscript Example)</p>
    <p>10<sup>2</sup> (Superscript Example)</p>
    <!-- sub is O (Subscript Example)
     sup is   (Superscript Example)-->

    <p><del>hello world</del></p>
    <p><ins>hello world</ins></p>
    <!-- del is Deleted Text
     ins is Inserted Text-->

</body>

</html>
