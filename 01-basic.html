<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- head tag is used to name the web page -->
    <title>HTML</title>
    <!--title tag is used to give name to web page   -->
  </head>

  <body>
    <center>
      <h1>Basic Html Tags</h1>
    </center>
    <hr />
    <!-- hr tag means horizontal rule and used to create a line -->
    <h1>hello</h1>
    <h2>hello</h2>
    <h3>hello</h3>
    <h4>hello</h4>
    <h5>hello</h5>
    <h6>hello</h6>
    <!-- h1 tag to h6 tag are various tag that  is used to give a different size of font -->

    <p>hello world</p>
    <pre>hello</pre>
    <!-- p tag is used to write a paragraph -->
    <!-- p tag is uses a block scope pre tag is used for poem,song space are
    considered in pre tag but p tag display linearly -->
    <div>hello</div>
    <span>hello</span>
    <!-- div is block scope 
    span tag is use to display in same line -->
    <a>w3school</a><br />
    <!--anchor tag is use to go  to a particular web page  -->
    <!-- br tag is used to break a line and form a new line -->

    <a href="https://www.w3schools.com/dsa/dsa_data_hashsets.php">w3school</a
    ><br />
    <!-- href is attribute inside that is value for that ************ we have to type a word inside an anchor tag so that they  can work***************** -->

    <center>
      <img src="google.png" alt="google" width="100px" height="100px" />
      <!-- img is immage tag src is source tag inside that we have to give the image name -->
      <!-- alt can be worked when the image name is given wrong -->
      <!-- width and heigth is used to adjust  the image -->
    </center>
    <!-- center is to show a content in the center of the page -->

    <p>
      Example:
      <strong
        >&lt;a href="https://google.com" target="_blank"&gt;Open
        Google&lt;/a&gt;</strong
      >
    </p>
    <!--strong tag is used to bold the text 
        &lt is less than 
        &gt is greater than  -->
  </body>
  <!-- body tag is used to perform some action in web page -->
</html>
