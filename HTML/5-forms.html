<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forms</title>
</head>

<body>

    <center>
        <h1>Registration Form</h1>
        <hr>
    </center>

    <form action="#" method="POST">

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br><br>

        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br><br>

        <label for="message">Message:</label>
        <br>
        <textarea id="message" name="message" rows="4" cols="30"></textarea>
        <br><br>

        <input type="submit" value="Register">
        <input type="reset">

    </form>

    <!-- About value Attribute
    <p>
        The <strong>value</strong> attribute defines the data sent to the server when the form is submitted.
    </p>
    <p>
        For example:
        <strong>&lt;input type="radio" name="gender" value="male"&gt;</strong>
    </p>
    <p>
        If the user selects "Male", the value <strong>male</strong> is sent to the server.
    </p> -->

</body>

</html>
