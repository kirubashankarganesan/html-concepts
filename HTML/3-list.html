<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>List</title>
</head>

<body>
  <center>
    <h1>List</h1>
  </center>
  <hr>
  <ol>
    <li>one</li>
    <li>two</li>
    <li>three</li>
  </ol>
  <!-- ol is order list and used to to show the content in order -->
  <!-- li  is  list item  -->
  <ul>
    <li>one</li>
    <li>two</li>
    <li>three</li>
  </ul>
  <!-- ul is unorder list and used to to show the content in bullet  point -->

</body>

</html>
